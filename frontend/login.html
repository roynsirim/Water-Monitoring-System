<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Water Intensity Monitoring</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --brand: #00b4d8; --bg-card: #1a2332; --border: rgba(255,255,255,.08); }
    body { background: linear-gradient(135deg, #0b1320, #111b29 60%, #0b1320);
           min-height: 100vh; display: flex; align-items: center; justify-content: center;
           font-family: 'Inter', system-ui, sans-serif; color: #e7ecf3; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
                 width: 100%; max-width: 420px; padding: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,.35); }
    .brand { color: var(--brand); font-weight: 700; }
    .form-control { background: #0f1a2a; border-color: var(--border); color: #e7ecf3; }
    .form-control:focus { background: #0f1a2a; border-color: var(--brand); color: #e7ecf3;
                          box-shadow: 0 0 0 .15rem rgba(0,180,216,.25); }
    .btn-brand { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 600; }
    .btn-brand:hover { background: #0077a6; border-color: #0077a6; color: #fff; }
    .alert-shake { animation: shake .35s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div class="brand h4 mb-1"><i class="bi bi-droplet-fill me-1"></i> Water Intensity Monitoring</div>
    <div class="text-muted small">Speciality Steels UK</div>
  </div>

  <div id="errBox" class="alert alert-danger d-none" role="alert"></div>
  <div id="warnBox" class="alert alert-warning d-none" role="alert"></div>

  <form id="loginForm" autocomplete="on">
    <div class="mb-3">
      <label class="form-label small text-muted">Email</label>
      <input type="email" class="form-control" id="email" required autofocus autocomplete="username">
    </div>
    <div class="mb-3">
      <label class="form-label small text-muted">Password</label>
      <input type="password" class="form-control" id="password" required minlength="8" autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-brand w-100" id="loginBtn">
      <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
    </button>
  </form>

  <div class="text-center text-muted small mt-3">
    Trouble signing in? Ask your administrator to reset your password.
  </div>
</div>

<script>
const errBox = document.getElementById('errBox');
const warnBox = document.getElementById('warnBox');

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.classList.add('d-none');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign-in failed');

    localStorage.setItem('wms_token', data.token);
    localStorage.setItem('wms_user', JSON.stringify(data.user));

    if (data.user.must_change_password) {
      warnBox.textContent = 'You must change your temporary password. Redirecting to settings…';
      warnBox.classList.remove('d-none');
      setTimeout(() => location.href = '/admin#change-password', 800);
    } else if (data.user.role === 'admin') {
      location.href = '/admin';
    } else {
      location.href = '/';
    }
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('d-none', 'alert-shake');
    void errBox.offsetWidth;
    errBox.classList.add('alert-shake');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Sign in';
  }
});
</script>
</body>
</html>
